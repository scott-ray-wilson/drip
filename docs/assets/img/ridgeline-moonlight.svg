<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Moonlight and stars over layered mountain ridges">
  <defs>
    <linearGradient id="nightsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a1130" />
      <stop offset="0.55" stop-color="#1b2350" />
      <stop offset="1" stop-color="#3a3766" />
    </linearGradient>
    <radialGradient id="moonglow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#eaf0ff" stop-opacity="0.9" />
      <stop offset="0.5" stop-color="#cdd8ff" stop-opacity="0.25" />
      <stop offset="1" stop-color="#cdd8ff" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="640" height="360" fill="url(#nightsky)" />
  <!-- moon -->
  <circle cx="468" cy="96" r="96" fill="url(#moonglow)" />
  <circle cx="468" cy="96" r="34" fill="#eef2ff" />
  <circle cx="456" cy="88" r="6" fill="#dfe6fb" opacity="0.7" />
  <circle cx="480" cy="104" r="4.5" fill="#dfe6fb" opacity="0.6" />
  <circle cx="474" cy="82" r="3.5" fill="#dfe6fb" opacity="0.6" />
  <!-- stars -->
  <g fill="#ffffff">
    <circle cx="60" cy="58" r="1.6" />
    <circle cx="104" cy="116" r="1.1" />
    <circle cx="150" cy="42" r="1.3" />
    <circle cx="198" cy="90" r="1" />
    <circle cx="250" cy="150" r="1.4" />
    <circle cx="300" cy="58" r="1.1" />
    <circle cx="340" cy="118" r="0.9" />
    <circle cx="92" cy="168" r="1" />
    <circle cx="176" cy="150" r="0.9" />
    <circle cx="262" cy="40" r="1" />
    <circle cx="322" cy="104" r="1.2" />
    <circle cx="36" cy="150" r="1.1" />
    <circle cx="128" cy="78" r="1.3" />
    <circle cx="222" cy="124" r="1" />
    <circle cx="600" cy="150" r="1.3" />
    <circle cx="610" cy="62" r="1.1" />
  </g>
  <g fill="#ffffff" opacity="0.55">
    <circle cx="84" cy="96" r="0.7" />
    <circle cx="168" cy="104" r="0.7" />
    <circle cx="286" cy="150" r="0.7" />
    <circle cx="46" cy="196" r="0.7" />
    <circle cx="356" cy="150" r="0.7" />
    <circle cx="596" cy="206" r="0.7" />
  </g>
  <!-- ridges (identical silhouette to the sunrise banner) -->
  <path d="M0 246 L132 192 L246 244 L368 182 L482 236 L640 190 L640 360 L0 360 Z" fill="#2a2f5e" opacity="0.55" />
  <path d="M0 296 L156 232 L300 292 L432 238 L560 296 L640 258 L640 360 L0 360 Z" fill="#171c3e" opacity="0.82" />
  <path d="M0 330 L188 288 L344 334 L520 294 L640 328 L640 360 L0 360 Z" fill="#0a0e26" />
</svg>
